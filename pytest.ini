[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage — enforced on every run via .coveragerc (fail_under = 100)
addopts = --cov=server --cov-report=term-missing --cov-report=html --cov-fail-under=100
