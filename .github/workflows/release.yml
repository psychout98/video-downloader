name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build ────────────────────────────────────────────────────────────
  build:
    uses: ./.github/workflows/build-installer.yml

  # ── Integration tests ────────────────────────────────────────────────
  integration-tests:
    uses: ./.github/workflows/integration-tests.yml

  # ── Tag & Release (only after build + ITs pass) ──────────────────────
  release:
    needs: [build, integration-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.1.0"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag: $NEW_TAG"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Write version file into update package
        run: |
          echo -n "${{ steps.version.outputs.tag }}" > .version
          # Re-create the update zip with the version file
          if [ -f dist/MediaDownloader-update.zip ]; then
            cd dist
            mkdir -p _update_repack
            unzip -o MediaDownloader-update.zip -d _update_repack
            cp ../.version _update_repack/.version
            rm MediaDownloader-update.zip
            cd _update_repack && zip -r ../MediaDownloader-update.zip . && cd ..
            rm -rf _update_repack
            cd ..
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/MediaDownloader-Setup.exe
            dist/MediaDownloader-update.zip
