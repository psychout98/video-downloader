name: Build Installer & Update Package

on:
  workflow_dispatch:
  workflow_call:

  push:
    paths:
      - 'requirements.txt'
      - 'run_server.bat'
      - 'stop_server.bat'
      - 'server/**'
      - 'frontend/**'
      - 'app/**'
      - 'installer/**'
      - '.github/workflows/build-installer.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # ── Frontend build ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── WPF App build ───────────────────────────────────────────────
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish WPF app
        working-directory: app/MediaDownloader
        run: |
          dotnet publish MediaDownloader/MediaDownloader.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ../../build/publish

      # ── Write version file ──────────────────────────────────────────
      - name: Write version file
        run: |
          $sha = git rev-parse --short HEAD
          $sha | Out-File -FilePath build/publish/.version -NoNewline -Encoding utf8

      # ── Inno Setup installer ────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      # ── Update package (for in-app updates) ─────────────────────────
      - name: Create update package
        run: |
          $sha = git rev-parse --short HEAD
          $sha | Out-File -FilePath .version -NoNewline -Encoding utf8
          Compress-Archive `
            -Path server, requirements.txt, run_server.bat, stop_server.bat, .version `
            -DestinationPath dist/MediaDownloader-update.zip `
            -Force

      # ── Upload artifacts ────────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MediaDownloader-Setup
          path: dist/MediaDownloader-Setup.exe
          retention-days: 30

      - name: Upload update package
        uses: actions/upload-artifact@v4
        with:
          name: MediaDownloader-Update
          path: dist/MediaDownloader-update.zip
          retention-days: 30
