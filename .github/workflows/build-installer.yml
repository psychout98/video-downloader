name: Build Windows Installer

on:
  # Run manually from the Actions tab — click "Run workflow"
  workflow_dispatch:

  # Also run automatically when you push relevant changes
  push:
    paths:
      - 'installer.pyw'
      - 'requirements.txt'
      - 'run_server.bat'
      - 'stop_server.bat'
      - 'server/**'
      - 'tray/**'
      - 'frontend/**'
      - '.github/workflows/build-installer.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # ── Frontend build ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Installer build ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build installer EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "MediaDownloader-Setup" `
            --distpath . `
            --workpath build\_pyinstaller `
            --add-data "server;server" `
            --add-data "tray;tray" `
            --add-data "run_server.bat;." `
            --add-data "stop_server.bat;." `
            --add-data "requirements.txt;." `
            installer.pyw

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaDownloader-Setup
          path: MediaDownloader-Setup.exe
          retention-days: 30
